<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BossAgent 控制台</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#64748b;--line:#e2e8f0;--brand:#2563eb;--good:#16a34a;--warn:#d97706;--bad:#dc2626}*{box-sizing:border-box}body{margin:0;background:var(--bg);font:14px/1.5 Inter,"Microsoft YaHei",sans-serif;color:var(--ink)}header{padding:28px max(24px,calc((100vw - 1180px)/2));background:linear-gradient(120deg,#10224c,#2563eb);color:#fff}h1{margin:0;font-size:28px}header p{margin:6px 0 0;opacity:.8}.wrap{max-width:1180px;margin:22px auto;padding:0 18px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 2px 5px #0f172a08}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}@media(max-width:800px){.span-8,.span-6,.span-4{grid-column:span 12}}h2{font-size:16px;margin:0 0 13px}h3{font-size:14px;margin:18px 0 8px;color:#334155}.status{display:flex;flex-wrap:wrap;gap:8px}.pill{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:5px 10px}.pill.good{background:#dcfce7;color:#15803d}.pill.bad{background:#fee2e2;color:#b91c1c}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.row.three{grid-template-columns:repeat(3,minmax(0,1fr))}@media(max-width:520px){.row,.row.three{grid-template-columns:1fr}}label{display:block;color:#475569;font-size:12px;margin-bottom:4px}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px;background:#fff;color:var(--ink)}textarea{min-height:98px;resize:vertical}button,.button{border:0;border-radius:8px;padding:9px 13px;background:var(--brand);color:#fff;cursor:pointer;font:inherit;text-decoration:none;display:inline-block}button.secondary,.button.secondary{background:#e2e8f0;color:#334155}button.warn{background:var(--warn)}button.danger{background:var(--bad)}.actions{display:flex;gap:8px;flex-wrap:wrap}.hint{font-size:12px;color:var(--muted);margin:6px 0}.toast{position:fixed;right:20px;bottom:20px;background:#172033;color:#fff;padding:10px 14px;border-radius:8px;display:none;z-index:4}.list{max-height:320px;overflow:auto}.item{padding:10px 0;border-bottom:1px solid var(--line)}.item:last-child{border:0}.item small{color:var(--muted)}.split{display:flex;justify-content:space-between;gap:8px;align-items:center}details{border-top:1px solid var(--line);margin-top:15px;padding-top:14px}summary{cursor:pointer;color:#334155;font-weight:600}.mono{font-family:ui-monospace,Consolas,monospace;white-space:pre-wrap}.hide{display:none}
  </style>
</head>
<body>
<header><h1>BossAgent 控制台</h1><p>配置、筛选、简历、话术与自动化控制都在这里完成。</p></header>
<main class="wrap"><div class="grid">
  <section class="card span-12"><div class="split"><h2>运行状态</h2><div class="actions"><button onclick="control('resume')">开始 / 继续</button><button class="warn" onclick="control('pause')">暂停</button><button class="danger" onclick="control('stop')">停止</button><a class="button secondary" href="/web_script.user.js" target="_blank">更新油猴脚本</a><a class="button secondary" href="https://www.zhipin.com/web/geek/job" target="_blank">打开 BOSS</a></div></div><div id="status" class="status"><span class="pill">加载中…</span></div></section>
  <section class="card span-8"><h2>投递设置</h2><div class="row three"><div><label>模型来源</label><select id="model_provider"><option value="ollama">Ollama</option><option value="openai">OpenAI 兼容</option></select></div><div><label>模型名称</label><input id="think_model"></div><div><label>评分阈值</label><input id="score_threshold" type="number"></div></div><div class="row"><div><label>Ollama 地址</label><input id="ollama_host"></div><div><label>OpenAI API 地址</label><input id="openai_api_base"></div></div><div class="row three"><div><label>本轮上限</label><input id="session_greet_limit" type="number" min="1" max="200"></div><div><label>操作等待 (ms)</label><input id="action_delay_ms" type="number" min="500" max="5000"></div><div><label>发送模式</label><select id="send_mode"><option value="text">仅话术</option><option value="image">话术 + 简历图</option></select></div></div><p class="hint"><label><input id="run_schedule_enabled" type="checkbox" style="width:auto"> 仅工作日 09:00–11:00、14:00–16:00 自动运行</label></p><div class="actions"><button onclick="saveConfig()">保存投递设置</button><button class="secondary" onclick="highSpeed()">应用 100 份黄金时段档</button></div>
  <details><summary>模型高级参数</summary><div class="row three"><div><label>Temperature</label><input id="model_temperature" type="number" step=".1"></div><div><label>Top P</label><input id="model_top_p" type="number" step=".05"></div><div><label><input id="disable_model_thinking" type="checkbox" style="width:auto"> 关闭模型思考</label></div></div></details></section>
  <section class="card span-4"><h2>语义筛选</h2><label>目标岗位意图</label><input id="job_filter_target_roles" placeholder="例如：Agent开发，RAG工程师"><p class="hint">模型会先判断岗位职责是否与目标意图一致；“AI 训练师”不会因同属 AI 就自动高分。</p><label>岗位类型</label><select id="job_filter_employment_type"><option value="any">不限</option><option value="full_time">仅正式岗位</option><option value="internship">仅实习岗位</option></select><div class="row"><div><label>期望城市</label><input id="job_filter_cities" placeholder="上海,北京"></div><div><label>职位关键词</label><input id="job_filter_title_keywords" placeholder="Python,Agent"></div></div><label>屏蔽公司关键词</label><input id="job_filter_blocked_companies" placeholder="外包,劳务"><div class="row"><div><label>最低月薪 K</label><input id="job_filter_salary_min_k" type="number"></div><div><label>最高月薪 K</label><input id="job_filter_salary_max_k" type="number"></div></div><div class="actions"><button onclick="saveFilters()">保存筛选</button></div></section>
  <section class="card span-6"><h2>简历与画像</h2><div class="actions"><label class="button secondary">上传 PDF<input id="pdf" type="file" accept="application/pdf" class="hide" onchange="uploadPdf()"></label><button class="secondary" onclick="generateProfile()">AI 生成画像与标签</button></div><label>简历 Markdown</label><textarea id="resume" placeholder="可直接编辑或上传 PDF"></textarea><button onclick="saveResume()">保存简历</button><details><summary>画像与搜索标签</summary><label>搜索标签（逗号分隔）</label><input id="tags"><label>用户画像</label><textarea id="user_detail"></textarea><button onclick="saveProfile()">保存画像和标签</button></details></section>
  <section class="card span-6"><h2>打招呼话术</h2><div class="actions"><button class="secondary" onclick="generateGreeting()">AI 生成草稿</button></div><label>话术内容</label><textarea id="greeting"></textarea><label>名称</label><input id="greeting_name" value="默认话术"><button onclick="saveGreeting()">启用并保存话术</button><p class="hint">开始自动化前，请确认这里有已保存的话术。</p></section>
  <section class="card span-6"><div class="split"><h2>最近职位</h2><button class="secondary" onclick="loadHistory()">刷新</button></div><div id="jobs" class="list"></div></section>
  <section class="card span-6"><div class="split"><h2>运行日志</h2><button class="secondary" onclick="loadLogs()">刷新</button></div><div id="logs" class="list mono"></div></section>
</div></main><div id="toast" class="toast"></div>
<script>
const $=id=>document.getElementById(id), api=async(path,opt={})=>{const r=await fetch(path,{headers:{'Content-Type':'application/json',...(opt.headers||{})},...opt});if(!r.ok)throw new Error((await r.json().catch(()=>({}))).detail||r.statusText);return r.headers.get('content-type')?.includes('application/json')?r.json():r.text()}, fields=['model_provider','think_model','score_threshold','ollama_host','openai_api_base','session_greet_limit','action_delay_ms','send_mode','model_temperature','model_top_p','job_filter_employment_type','job_filter_salary_min_k','job_filter_salary_max_k'], filterFields=['job_filter_target_roles','job_filter_cities','job_filter_title_keywords','job_filter_blocked_companies'];
function toast(t){const e=$('toast');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',2800)}function csv(v){return v.split(/[,，]/).map(x=>x.trim()).filter(Boolean)}function setConfig(c){fields.forEach(k=>{if($(k))$(k).value=c[k]??''});filterFields.forEach(k=>$(k).value=(c[k]||[]).join(', '));$('run_schedule_enabled').checked=!!c.run_schedule_enabled;$('disable_model_thinking').checked=!!c.disable_model_thinking}
async function load(){try{const [s,c,r,p,g]=await Promise.all([api('/status'),api('/config'),api('/resume'),api('/resume/profile'),api('/greeting')]);setConfig(c.config);$('resume').value=r.markdown||'';$('tags').value=(p.tags||[]).join(', ');$('user_detail').value=p.user_detail||'';$('greeting').value=g.active_content||'';$('greeting_name').value=g.active?.name||'默认话术';renderStatus(s);loadHistory();loadLogs()}catch(e){toast('加载失败：'+e.message)}}
function renderStatus(s){const sc=s.script||{},ready=s.cache?.profile_generated&&s.greeting?.confirmed;$('status').innerHTML=[['控制 '+s.backend.control,s.backend.control==='running'?'good':''],['脚本 '+(sc.connected?'已连接':'未连接'),sc.connected?'good':'bad'],['模型 '+(s.ollama?.available?'可用':'待检查'),s.ollama?.available?'good':''],['配置 '+(ready?'就绪':'待完善'),ready?'good':'bad'],['本轮 '+(sc.detail?.sessionGreetCount||0)+'/'+(sc.detail?.sessionGreetLimit||$('session_greet_limit').value||'-'),'']].map(x=>`<span class="pill ${x[1]}">${x[0]}</span>`).join('')}
async function saveConfig(){const c={};fields.forEach(k=>c[k]=$(''+k).type==='number'?Number($(k).value||0):$(k).value);c.run_schedule_enabled=$('run_schedule_enabled').checked;c.disable_model_thinking=$('disable_model_thinking').checked;await api('/config',{method:'POST',body:JSON.stringify({config:c})});toast('投递设置已保存');load()}
async function saveFilters(){const c={};filterFields.forEach(k=>c[k]=csv($(k).value));['job_filter_employment_type','job_filter_salary_min_k','job_filter_salary_max_k'].forEach(k=>c[k]=$(''+k).type==='number'?Number($(k).value||0):$(k).value);await api('/config',{method:'POST',body:JSON.stringify({config:c})});toast('筛选已保存')}
async function highSpeed(){await api('/config',{method:'POST',body:JSON.stringify({config:{session_greet_limit:100,action_delay_ms:900,run_schedule_enabled:true}})});toast('已应用 100 份黄金时段档');load()}
async function control(command){await api('/control',{method:'POST',body:JSON.stringify({command,new_run:command==='resume'})});toast('已发送 '+command);setTimeout(load,400)}async function saveResume(){await api('/resume',{method:'PUT',body:JSON.stringify({markdown:$('resume').value})});toast('简历已保存')}async function uploadPdf(){const f=$('pdf').files[0];if(!f)return;const d=new FormData();d.append('file',f);const r=await fetch('/resume/upload-pdf',{method:'POST',body:d});if(!r.ok)throw new Error('上传失败');toast('PDF 已提取');load()}async function generateProfile(){toast('正在生成画像…');await api('/resume/profile/generate',{method:'POST'});toast('画像已生成');load()}async function saveProfile(){await api('/resume/profile',{method:'PUT',body:JSON.stringify({tags:csv($('tags').value),user_detail:$('user_detail').value})});toast('画像已保存')}async function generateGreeting(){toast('正在生成话术…');const r=await api('/greeting/generate',{method:'POST',body:JSON.stringify({style:'default'})});$('greeting').value=r.content||'';toast('话术草稿已生成')}async function saveGreeting(){await api('/greeting',{method:'PUT',body:JSON.stringify({content:$('greeting').value,name:$('greeting_name').value||'默认话术'})});toast('话术已启用')}async function loadHistory(){const r=await api('/history?limit=30');$('jobs').innerHTML=(r.jobs||[]).map(j=>`<div class="item"><b>${j.company||'未知公司'} / ${j.title||'未知职位'}</b><br><small>${j.salary||''} ${j.city||''} · ${j.final_action||j.recommendation||'处理中'} · ${j.updated_at||''}</small></div>`).join('')||'<p class="hint">暂无记录</p>'}async function loadLogs(){const r=await api('/logs?limit=40');$('logs').innerHTML=(r.logs||[]).map(x=>`<div class="item">${x.time?.slice(11,19)||''} [${x.source||''}] ${x.message||''}</div>`).join('')||'<p class="hint">暂无日志</p>'}
window.addEventListener('error',e=>toast(e.error?.message||e.message));load();setInterval(load,12000);
</script></body></html>
